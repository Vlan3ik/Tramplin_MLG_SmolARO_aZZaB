services:
  db:
    image: postgis/postgis:16-3.4
    container_name: tramplin_db
    environment:
      POSTGRES_USER: tramplin
      POSTGRES_PASSWORD: tramplin
      POSTGRES_DB: tramplin_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tramplin -d tramplin_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: tramplin_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    build:
      context: .
      dockerfile: ./minio/mc-init.Dockerfile
    container_name: tramplin_minio_init
    depends_on:
      - minio
    volumes:
      - ./minio/init.sh:/init.sh:ro
      - ./minio/seed/companies:/seed/companies:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: tramplin_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ../BackEND/Monolith/Monolith
      dockerfile: Dockerfile
      target: build
    container_name: tramplin_api
    working_dir: /src
    command: dotnet watch --project Monolith.csproj run --urls http://0.0.0.0:8080
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - ../BackEND/Monolith/Monolith:/src
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=tramplin_db;Username=tramplin;Password=tramplin
      Jwt__Issuer: Tramplin.Api
      Jwt__Audience: Tramplin.Client
      Jwt__Secret: CHANGE_THIS_SECRET_TO_A_LONG_RANDOM_KEY_32_BYTES_MIN_1234567890
      Jwt__AccessTokenMinutes: 15
      Jwt__RefreshTokenDays: 30
      Minio__Endpoint: minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Minio__Bucket: tramplin-media
      Minio__UseSsl: "false"
      ConnectionStrings__Redis: redis:6379

  frontend:
    image: node:20-alpine
    container_name: tramplin_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ../FrontEND:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_API_TARGET: http://api:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: tramplin_nginx
    depends_on:
      - api
      - minio
      - redis
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "1488:1488"

volumes:
  pg_data:
  minio_data:
  frontend_node_modules:

